

<section id="newss" class="pad-50 vh-100">
<div class="container">
  <div class="row"><h2 class="styleHeader"><br/><span>News</span></h2></div>
  <div class="row "data-aos="fade-up" *ngFor="let news of news; let $index = index;" style="margin-bottom: 15px;"> 
    <div class="col-sm-2">
      <img src="{{news.featured_image_src}}" class="img-responsive w-100" alt="ESAT UAE"/>
    </div>
    <div class="col-sm-10">
      <h4>{{news.title.rendered}}</h4>
      <div [innerHtml]="news.excerpt.rendered | slice:0:200"></div>
      <p><a (click)="goToProductDetails(news.slug)" ><b>Read More</b></a></p>
    </div>
  </div>
</div>
</section>
