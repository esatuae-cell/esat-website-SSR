


<section class="stories-section" >

  <div class="container"> 
    <div class="our-story-sec">
  <!-- TOP CONTENT -->
  <div class="story-content d-block" key="activeStory">
    <div class="image-box">
      <img [src]="activeStory()?.image" alt="story" />
    </div>

    <div class="text-box" data-aos="fade-up">
      <h2 class="titlt-f">{{ activeStory()?.year }}</h2>
      <h3>{{ activeStory()?.title }}</h3>
      <p>{{ activeStory()?.description }}</p>
    </div>
  </div>

  <!-- TIMELINE -->
  <div class="timeline-wrapper" data-aos="fade-up">

    <button class="nav-btn left" (click)="prev()">‹</button>

    <div class="timeline">
      <div
        class="year-item"
        *ngFor="let story of visibleStories(); let i = index"
        [class.active]="activeIndex() === (startIndex() + i)"
        (click)="selectYear(i)"
      >
        <span>{{ story.year }}</span>
      </div>
    </div>

    <button class="nav-btn right" (click)="next()">›</button>

  </div>

  </div>
</div>
</section>
