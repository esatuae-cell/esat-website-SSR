<form class="partnership-form" data-aos="fade-up">
  <div class="row">
    <div class="form-group col-md-6">
      <input
        type="text"
        id="full_name"
        class="form-control"
        formControlName="fullName"
        placeholder="Enter your  name *"
      />
      <!-- <div>
        Please enter your full name.
      </div> -->
    </div>

    <div class="form-group col-md-6">
      <input
        type="text"
        id="Last_name"
        class="form-control"
        formControlName="fullName"
        placeholder="Enter your Last name *"
        required
      />
    </div>

    <div class="form-group col-md-6">
      <input
        type="tel"
        id="phone"
        class="form-control"
        formControlName="phone"
        placeholder="Enter your phone number *"
      />
      <!-- <div>
        A valid phone number is required.
      </div> -->
    </div>

    <div class="form-group col-md-6">
      <input
        type="email"
        id="email"
        class="form-control"
        formControlName="email"
        placeholder="Enter your email address *"
      />
      <!-- <div>
        Please enter a valid email address.
      </div> -->
    </div>

    <div class="form-group col-md-6">
      <input
        type="text"
        id="com_name"
        class="form-control"
        formControlName="companyName"
        placeholder="Enter your company name *"
      />
      <!-- <div>
        Company name is required.
      </div> -->
    </div>

    <div class="form-group col-md-6">
      <select class="form-control" id="business_type" formControlName="businessType">
        <option value="" disabled selected>Partnership Type *</option>
        <option value="Reseller Program">Reseller Program</option>
        <option value="Referral Program">Referral Program</option>
        <option value="Affiliate Program">Affiliate Program</option>
      </select>
      <!-- <div>
        Please select a partnership type.
      </div> -->
    </div>

    <div class="form-group col-md-12">
      <textarea
        id="comments"
        class="form-control"
        formControlName="comments"
        rows="4"
        placeholder="Enter your message here..."
      ></textarea>
      <!-- <div>
        A message is required.
      </div> -->
    </div>
  </div>

  <button type="submit" class="btn btn-primary mt-3">Submit</button>
</form>
